<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ALAN Roomba UI test</title>
    <style>
      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        margin: 0;
        border: 0;
        overflow: hidden;
        background: #05050b;
      }
    </style>
  </head>
  <body>
    <iframe id="appFrame" title="ALAN"></iframe>
    <script>
      const params = new URLSearchParams(window.location.search);
      const frame = document.getElementById("appFrame");
      const chapter = params.get("chapter") || "camera";
      frame.src = `index.html?dev=1&desktop=1&chapter=${encodeURIComponent(chapter)}`;

      function visibleTarget(doc, selector) {
        return Array.from(doc.querySelectorAll(selector)).find((item) => !item.hidden && item.offsetParent !== null);
      }

      function openTarget(doc, name) {
        const launcher = visibleTarget(doc, `[data-target="${name}"]`);
        if (launcher) launcher.click();
      }

      frame.addEventListener("load", () => {
        window.setTimeout(() => {
          const doc = frame.contentDocument;
          const target = params.get("target") || "app";

          openTarget(doc, "roomba");

          if (target === "camera" || target === "camera-next") {
            window.setTimeout(() => {
              const camera = doc.querySelector("[data-open-camera]");
              if (camera) camera.click();

              if (target === "camera-next") {
                window.setTimeout(() => {
                  const next = doc.querySelector('[data-roomba-camera-nav="next"]');
                  if (next) next.click();
                }, 900);
              }
            }, 700);
          }
        }, 2600);
      });
    </script>
  </body>
</html>
